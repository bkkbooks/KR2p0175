body:
  text: 睡虎地秦墓竹簡語書廿年四月丙戌朔丁亥南郡守騰謂縣道嗇夫古者民各有鄉俗其所利及好惡不同或不便於民害於邦是以聖王作為法度以矯端民心去其邪避除其惡俗法律未足民多詐巧故後有閒令下者凡法律令者以教道民去其淫避除其惡俗而使之之於為善殹今法律令已具矣而吏民莫用鄉俗淫失之民不止是即法主之明法殹而長邪避淫失之民甚害於邦不便於民故騰為是而脩法律令田令及為閒私方而下之令吏明布令吏民皆明智之毋巨於罪今法律令已布聞吏民犯法為閒私者不止私好鄉俗之心不變自從令丞以下智而弗舉論是即明避主之明法殹而養匿邪避之民如此則為人臣亦不忠矣若弗智是即不勝任不智殹智而弗敢論是即不廉殹此皆大罪殹而令丞弗明智甚不便今且令人案行之舉劾不從令者致以律論及令丞有且課縣官獨多犯令而令丞弗得者以令丞聞以次傳別書江陵布以郵行凡良吏明法律令事無不能殹有廉絜敦𢡱而好佐上以一曹事不足獨治殹故有公心有能自端殹而惡與人辨治是以不爭書惡吏不明法律令不智事不廉絜毋以佐上緰隨疾事易口舌不羞辱輕惡言而易病人毋公端之心而有冒柢之治是以善斥事喜爭書爭書因恙瞋目扼捾以視力訏詢疾言以視治誈醜言麃斫以視險阬閬強肮以視強而上猶智之殹故如此者不可不為罰發書移書曹曹莫受以告府府令曹畫之其畫最多者當居曹奏令丞令丞以為不直志千里使有籍書之以為惡吏語書
